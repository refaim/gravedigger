name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  check:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: x64

      - name: Install dependencies
        run: uv sync

      - name: Download game files
        run: |
          python -c "
          from urllib.request import urlretrieve
          from zipfile import ZipFile
          from pathlib import Path

          Path('game').mkdir(exist_ok=True)

          urlretrieve('https://kosmodan.ru/f/ddave2-softdisk.zip', 'ddave2-softdisk.zip')
          ZipFile('ddave2-softdisk.zip').extractall()
          Path('ddave2').rename('game/softdisk')

          urlretrieve('https://kosmodan.ru/f/ddave2-retail.zip', 'ddave2-retail.zip')
          ZipFile('ddave2-retail.zip').extractall()
          Path('ddave2').rename('game/retail')
          "

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .

      - name: Tests with coverage
        run: uv run pytest --cov=gravedigger --cov-branch --cov-report=term-missing --cov-report=xml --cov-fail-under=100 --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: junit.xml

  build-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: x64

      - name: Install dependencies
        run: uv sync

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka
          key: nuitka-windows-py3.13-${{ hashFiles('uv.lock') }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ccache
          key: ccache-windows-${{ hashFiles('uv.lock') }}

      - name: Install ccache
        run: choco install ccache

      - name: Build
        run: uv run nuitka --onefile --prefer-source-code --assume-yes-for-downloads --show-scons --output-dir=build --output-filename=gravedigger.exe gravedigger/cli.py

      - name: Package
        run: Compress-Archive -Path build\gravedigger.exe -DestinationPath gravedigger-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gravedigger-windows-x86_64
          path: gravedigger-windows-x86_64.zip

  build-linux:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: x64

      - name: Install dependencies
        run: uv sync

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~/.cache/Nuitka
          key: nuitka-linux-py3.13-${{ hashFiles('uv.lock') }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-linux-${{ hashFiles('uv.lock') }}

      - name: Install ccache
        run: sudo apt-get install -y ccache

      - name: Build
        run: uv run nuitka --onefile --prefer-source-code --assume-yes-for-downloads --show-scons --output-dir=build --output-filename=gravedigger gravedigger/cli.py

      - name: Package
        run: tar czf gravedigger-linux-x86_64.tar.gz -C build gravedigger

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gravedigger-linux-x86_64
          path: gravedigger-linux-x86_64.tar.gz

  build-macos-arm:
    needs: check
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Nuitka
          key: nuitka-macos-arm-py3.13-${{ hashFiles('uv.lock') }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-macos-arm-${{ hashFiles('uv.lock') }}

      - name: Install ccache
        run: brew install ccache

      - name: Build
        run: uv run nuitka --onefile --prefer-source-code --assume-yes-for-downloads --show-scons --output-dir=build --output-filename=gravedigger gravedigger/cli.py

      - name: Package
        run: tar czf gravedigger-macos-arm64.tar.gz -C build gravedigger

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gravedigger-macos-arm64
          path: gravedigger-macos-arm64.tar.gz

  release:
    needs: [build-windows, build-linux, build-macos-arm]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Get version
        id: version
        run: echo "version=$(grep -oP '(?<=__version__ = \")([^\"]+)' gravedigger/__init__.py)" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}.${{ github.run_number }}
        run: |
          mv gravedigger-windows-x86_64/gravedigger-windows-x86_64.zip gravedigger-${VERSION}-windows-x86_64.zip
          mv gravedigger-linux-x86_64/gravedigger-linux-x86_64.tar.gz gravedigger-${VERSION}-linux-x86_64.tar.gz
          mv gravedigger-macos-arm64/gravedigger-macos-arm64.tar.gz gravedigger-${VERSION}-macos-arm64.tar.gz

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}.${{ github.run_number }}
          name: v${{ steps.version.outputs.version }}.${{ github.run_number }}
          files: |
            gravedigger-${{ steps.version.outputs.version }}.${{ github.run_number }}-windows-x86_64.zip
            gravedigger-${{ steps.version.outputs.version }}.${{ github.run_number }}-linux-x86_64.tar.gz
            gravedigger-${{ steps.version.outputs.version }}.${{ github.run_number }}-macos-arm64.tar.gz
